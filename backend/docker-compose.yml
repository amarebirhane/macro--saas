version: '3.8'

services:
  db:
    image: postgres:15
    container_name: microsaas-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: amare
      POSTGRES_DB: macro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
